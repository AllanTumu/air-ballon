name: Feature request
description: Suggest a new capability for the dashboard or ingester.
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user need, not the implementation. Example "Tour guides need a printable morning summary."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional. If you have an idea, sketch it.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I'm willing to help implement this
        - label: This is mainly a documentation request
        - label: This requires a new data source
