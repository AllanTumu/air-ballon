# Cappadocia Balloon Flight Conditions — full stack.
# `docker compose up -d` to bring everything online.
# Public read-only Grafana behind nginx on :80/:443.
# Direct Grafana access on http://localhost:${GRAFANA_HOST_PORT:-3030} (loopback only).

services:
  db:
    image: timescale/timescaledb:2.16.1-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Don't expose to the public internet by default — keep DB inside compose network.

  ingester:
    build: ./ingester
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_DSN: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      FORECAST_INTERVAL_MIN: ${FORECAST_INTERVAL_MIN:-60}
      METAR_INTERVAL_MIN: ${METAR_INTERVAL_MIN:-15}
      HISTORICAL_LOOKBACK_DAYS: ${HISTORICAL_LOOKBACK_DAYS:-90}
      INGESTER_USER_AGENT: ${INGESTER_USER_AGENT}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  grafana:
    # Grafana 13.x (OSS). The `grafana/grafana` repo only publishes
    # CI-suffixed tags like 13.1.0-25196703233-ubuntu — not stable to pin
    # against. `grafana/grafana-oss` is still publishing clean semver tags
    # for the OSS build, so we stay on it.
    image: grafana/grafana-oss:13.0.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Public read-only access — anyone can view, only admins can edit.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      # Hide the login form / sign-in button from anonymous visitors. They're
      # not meant to log in. Admins can still authenticate via /login (basic
      # auth flow remains enabled below).
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "true"
      GF_USERS_DEFAULT_THEME: "dark"
      # When a viewer visits the Grafana root (/), serve our dashboard rather
      # than the default Grafana home page. This makes shallweflytomorrow.com
      # land directly on "Will balloons fly tomorrow?".
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/cappadocia-flight-conditions.json
      # Hide the news feed and announcements panel — distracting for non-technical viewers.
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      # Basic auth still enabled for admin login (kept on so we can manage it):
      GF_AUTH_BASIC_ENABLED: "true"
      # Permit HTML in Text panels (needed for the Windy.com live wind embed
      # and any future iframe content). Trade-off: dashboard editors with
      # write access could inject HTML/JS — fine here because anonymous role
      # is Viewer-only; only the admin user can edit.
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      # Allow third-party domains (windy.com, esri arcgisonline) to be loaded
      # in iframes / map tiles.
      GF_SECURITY_CONTENT_SECURITY_POLICY: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN}
      GF_INSTALL_PLUGINS: "grafana-clock-panel"
      # Datasource provisioning needs the DB creds:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      # Host port is configurable (default 3030) to avoid conflicts. Container
      # port stays 3000 — that's Grafana's default and nginx proxies to it
      # over the compose network. Bind to 127.0.0.1 so it isn't directly
      # exposed to the internet; nginx is the public entrypoint.
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3030}:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - grafana
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"

  # Run on demand:  docker compose run --rm certbot
  certbot:
    image: certbot/certbot:v2.11.0
    profiles: ["init"]
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  db_data:
  grafana_data:
  certbot_certs:
  certbot_www:
