user  nginx;
worker_processes  auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    # Replace the placeholder with your actual domain at deploy time, OR use the
    # _ default to serve over plain HTTP while you bring the box up. Search this
    # file for "DOMAIN_PLACEHOLDER".

    # ---- HTTP: ACME challenges + redirect everything else to HTTPS -----------
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            # Until certs exist, serve directly over HTTP. After certbot:
            #   return 301 https://$host$request_uri;
            proxy_pass         http://grafana:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # ---- HTTPS: the real site -----------------------------------------------
    # Uncomment after running certbot once with --webroot.
    # server {
    #     listen 443 ssl http2;
    #     server_name DOMAIN_PLACEHOLDER;
    #
    #     ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     add_header Strict-Transport-Security "max-age=31536000" always;
    #
    #     location / {
    #         proxy_pass         http://grafana:3000;
    #         proxy_set_header   Host $host;
    #         proxy_set_header   X-Real-IP $remote_addr;
    #         proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade $http_upgrade;
    #         proxy_set_header   Connection "upgrade";
    #     }
    # }
}
